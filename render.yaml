# Render Deployment Configuration
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: striver-sde-visualizer
    runtime: node
    region: singapore  # Closest to India for low latency
    plan: free

    # Build configuration
    buildCommand: npm install && npm run build
    startCommand: npm start

    # Health check
    healthCheckPath: /

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_LOCAL_TRACER
        value: "true"
      # Optional: Add your Gemini API key if you want AI features
      # - key: GEMINI_API_KEY
      #   sync: false  # Set this manually in Render dashboard
